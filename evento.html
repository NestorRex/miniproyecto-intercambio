<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Crear Evento</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Crear Intercambio de Regalos 🎁</h2>

<div class="card p-4 shadow">

<!-- Organizador -->

<div class="mb-3">
<label class="form-label">Nombre del organizador</label>
<input type="text" id="organizador" class="form-control">
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" id="participa">
<label class="form-check-label">
El organizador participa
</label>
</div>

<!-- Evento -->

<div class="mb-3">
<label class="form-label">Nombre del evento</label>
<input type="text" id="nombreEvento" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Fecha</label>
<input type="date" id="fechaEvento" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Presupuesto</label>
<input type="number" id="presupuestoEvento" class="form-control">
</div>

<hr>

<!-- Participantes -->

<h5>Agregar Participantes</h5>

<div class="d-flex mb-3">

<input type="text" id="nuevoParticipante" class="form-control me-2" placeholder="Nombre">

<button class="btn btn-primary" onclick="agregarParticipante()">
Agregar
</button>

</div>

<ul id="listaParticipantes" class="list-group mb-3"></ul>

<button class="btn btn-success w-100" onclick="guardarEvento()">
Guardar Evento
</button>

</div>

</div>

<script src="js/app.js"></script>

</body>

</html>
