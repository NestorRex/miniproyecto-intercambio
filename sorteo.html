<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Sorteo</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Sorteo del Intercambio 🎁</h2>

<div class="card p-4 shadow">

<h4>Información del Evento</h4>

<p><strong>Organizador:</strong> <span id="org"></span></p>
<p><strong>Evento:</strong> <span id="nombreEvento"></span></p>
<p><strong>Fecha:</strong> <span id="fechaEvento"></span></p>
<p><strong>Presupuesto:</strong> $<span id="presupuestoEvento"></span></p>

<hr>

<h4>Participantes</h4>

<ul id="listaParticipantes" class="list-group mb-3"></ul>

<div class="text-center">

<button class="btn btn-danger" onclick="hacerSorteo()">
Realizar Sorteo
</button>

</div>

<hr>

<h4 class="mt-3">Resultados</h4>

<ul id="resultadoSorteo" class="list-group"></ul>

</div>

</div>

<script src="js/sorteo.js"></script>

</body>

</html>
